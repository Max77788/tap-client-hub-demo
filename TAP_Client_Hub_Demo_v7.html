<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAP Associates — Client Hub (Demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#eef1f6; --card:#ffffff; --ink:#1a2340; --muted:#5f667d;
    --line:#dde2ec; --teal:#1c2a5e; --teal-soft:#e7ebf5; --teal-ink:#16234d;
    --amber:#b9791f; --amber-soft:#f7edda; --red:#a8392f; --red-soft:#f6e2df;
    --green:#2f7d4f; --green-soft:#e3efe6; --blue:#2c5d86; --blue-soft:#e0eaf2;
    --paid:#1c2a5e; --paid-soft:#e7ebf5;
    --shadow:0 1px 2px rgba(26,35,64,.06),0 8px 24px rgba(26,35,64,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Public Sans",system-ui,sans-serif;background:var(--paper);color:var(--ink);
    -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.45}
  h1,h2,h3,.disp{font-family:"Fraunces",Georgia,serif;letter-spacing:-.01em}
  .app{display:flex;min-height:100vh}
  /* SIDEBAR */
  .side{width:236px;flex:0 0 236px;background:linear-gradient(180deg,#21305f 0%,#1a2750 100%);color:#eef2fb;
    display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh}
  .brand{font-family:"Fraunces";font-weight:600;font-size:24px;color:#fff;line-height:1}
  .brand small{display:block;font-family:"Public Sans";font-weight:500;font-size:10.5px;
    letter-spacing:.13em;text-transform:uppercase;color:#9fb0d8;margin-top:6px}
  .nav{margin-top:28px;display:flex;flex-direction:column;gap:3px;flex:1}
  .nav button{all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;
    padding:10px 12px;border-radius:10px;font-weight:500;color:#c4cee8;font-size:14px;transition:.15s}
  .nav button .ic{width:18px;text-align:center;font-size:15px;opacity:.9}
  .nav button .ct{margin-left:auto;background:rgba(255,255,255,.16);color:#eef2fb;
    font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px}
  .nav button:hover{background:rgba(255,255,255,.10);color:#fff}
  .nav button.on{background:#ffffff;color:var(--teal-ink);font-weight:600}
  .nav button.on .ct{background:var(--teal-soft);color:var(--teal-ink)}
  .nav .sep{height:1px;background:rgba(255,255,255,.14);margin:12px 6px}
  .side .foot{font-size:11px;color:#8a9bc6;line-height:1.5}
  /* MAIN */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{padding:22px 32px 0;display:flex;align-items:flex-end;justify-content:space-between;gap:18px}
  .top h1{font-size:30px;font-weight:600}
  .top p{color:var(--muted);font-size:13.5px;margin-top:3px}
  .wrap{padding:18px 32px 48px}
  /* banner */
  .tip{background:var(--teal-soft);border:1px solid #cdd6ec;border-radius:14px;
    padding:13px 16px;display:flex;gap:12px;align-items:flex-start;margin:14px 32px 0;color:var(--teal-ink)}
  .tip b{font-weight:700}
  .tip .x{margin-left:auto;cursor:pointer;border:none;background:none;color:var(--teal-ink);
    font-size:18px;opacity:.6;line-height:1}
  .tip .x:hover{opacity:1}
  /* controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0 4px}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;padding:11px 14px 11px 38px;border:1px solid var(--line);
    border-radius:11px;background:var(--card);font:inherit;font-size:14px}
  .search input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-soft)}
  .search .mag{position:absolute;left:13px;top:11px;opacity:.45}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:3px}
  .seg button{all:unset;cursor:pointer;padding:7px 13px;border-radius:8px;font-size:13px;
    font-weight:500;color:var(--muted)}
  .seg button.on{background:var(--teal);color:#fff;font-weight:600}
  select.pick{padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:var(--card);
    font:inherit;font-size:13.5px;color:var(--ink)}
  .btn{all:unset;cursor:pointer;background:var(--ink);color:#fff;padding:10px 16px;border-radius:11px;
    font-weight:600;font-size:13.5px;display:inline-flex;gap:7px;align-items:center}
  .btn:hover{opacity:.9}
  .btn.alt{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .count{color:var(--muted);font-size:13px;margin:12px 2px 6px}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .statcard{flex:1;min-width:120px;background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:13px 16px;box-shadow:0 1px 2px rgba(33,31,26,.04)}
  .statcard .sn{font-family:"Fraunces";font-weight:600;font-size:26px;line-height:1}
  .statcard .sl{font-size:12px;color:var(--muted);margin-top:4px}
  /* workload */
  .sect2{font-family:"Fraunces";font-weight:600;font-size:18px;margin:26px 0 10px}
  .insight{display:flex;gap:12px;background:var(--amber-soft);border:1px solid #ead9b6;color:#6b4a12;
    border-radius:14px;padding:14px 16px;margin-top:16px;font-size:13.5px;line-height:1.5}
  .insight b{color:#4a3208}
  .legend{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:8px;font-size:12px;color:var(--muted)}
  .lgd{display:flex;align-items:center;gap:6px}
  .lgd i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .lgd-note{margin-left:auto;font-style:italic;opacity:.8}
  .wrow{display:grid;grid-template-columns:170px 1fr 120px;align-items:center;gap:14px;padding:10px 0;
    border-bottom:1px solid #efeade}
  .wrow:last-child{border-bottom:none}
  .wrow-u{opacity:.92}
  .wname{font-weight:600;font-size:14px;line-height:1.25}
  .wname .wsub{display:block;font-weight:500;font-size:11.5px;color:var(--muted);margin-top:2px}
  .wtrack{display:flex;height:22px;border-radius:7px;overflow:hidden;background:#efeade}
  .wseg{height:100%;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .wload{text-align:right}
  .wload b{font-family:"Fraunces";font-size:19px}
  .wdiff{display:block;font-size:11px;font-weight:600;margin-top:1px}
  .d-hi{color:var(--amber)} .d-lo{color:var(--green)} .d-mid{color:var(--muted)}
  .wrow-u .wdiff{color:var(--red)}
  .chips2{display:flex;flex-wrap:wrap;gap:5px}
  .schip{font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:20px;
    background:color-mix(in srgb,var(--c) 12%,#fff);color:var(--c);border:1px solid color-mix(in srgb,var(--c) 25%,#fff)}
  .schip b{font-weight:700}
  .lname2{font-weight:600}
  .fineprint{font-size:11.5px;color:var(--muted);line-height:1.5;margin:14px 2px 0;font-style:italic}
  /* support */
  .supgrid{display:flex;gap:16px;align-items:flex-start;margin-top:16px}
  .supmain{flex:2;min-width:0}.supside{flex:1;min-width:240px;display:flex;flex-direction:column;gap:14px}
  .suph{font-family:"Fraunces";font-weight:600;font-size:21px}
  .suph2{font-family:"Fraunces";font-weight:600;font-size:16px;margin-bottom:12px}
  .suphint{color:var(--muted);font-size:13.5px;margin:5px 0 14px;line-height:1.5}
  .shot-note{display:flex;gap:10px;background:var(--amber-soft);border:1px solid #e8d3a6;color:#7a5210;
    border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.5;margin-bottom:16px}
  .supmain .sl{display:block;font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:var(--muted);margin:14px 0 5px}
  .supmain input,.supmain select,.supmain textarea{width:100%;padding:10px 12px;border:1px solid var(--line);
    border-radius:10px;font:inherit;font-size:14px;background:#fff;resize:vertical}
  .supmain input:focus,.supmain select:focus,.supmain textarea:focus{outline:none;border-color:var(--teal);
    box-shadow:0 0 0 3px var(--teal-soft)}
  .sup2{display:flex;gap:12px;margin:0}.sup2>div{flex:1}
  .urgrow{display:flex;align-items:center;gap:9px;margin:14px 0 2px;font-size:13.5px;cursor:pointer;
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .urgrow input{width:auto!important}
  .subjbox{margin-top:16px;background:#f3f6fc;border:1px dashed #c3cde6;border-radius:11px;padding:11px 14px}
  .subjbox span{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .subjbox div{font-size:13.5px;margin-top:4px;color:var(--ink);word-break:break-word}
  .supcontact{padding:18px 20px}
  .contact{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--line);
    border-radius:11px;margin-bottom:9px;text-decoration:none;color:var(--ink);transition:.12s}
  .contact:hover{border-color:var(--teal);background:var(--teal-soft)}
  .contact .ci{width:34px;height:34px;border-radius:9px;background:var(--teal-soft);display:flex;
    align-items:center;justify-content:center;font-size:16px}
  .contact .ct{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .contact .cv{font-weight:600;font-size:13.5px}
  .provby{font-size:12px;color:var(--muted);margin-top:4px;text-align:center}
  .provby b{color:var(--teal)}
  .step{display:flex;gap:11px;padding:8px 0;border-bottom:1px solid #eef1f6}
  .step:last-child{border-bottom:none}
  .stepn{flex:0 0 24px;height:24px;border-radius:50%;background:var(--teal);color:#fff;font-weight:700;
    font-size:12px;display:flex;align-items:center;justify-content:center}
  .stept{font-weight:600;font-size:13.5px}.stepd{font-size:12.5px;color:var(--muted);line-height:1.45;margin-top:1px}
  .egood{font-size:12.5px;color:var(--green);margin-bottom:6px}
  .ebad{font-size:12.5px;color:var(--red)}
  .egood .mono,.ebad .mono{color:var(--ink)}
  @media(max-width:780px){.supgrid{flex-direction:column}.supside{width:100%}}
  @media(max-width:620px){.wrow{grid-template-columns:1fr;gap:6px}.wtrack{order:3}.wload{text-align:left}}
  /* client cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
  .ccard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;
    cursor:pointer;transition:.14s;box-shadow:0 1px 2px rgba(33,31,26,.04)}
  .ccard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#cfc7b5}
  .ccard .nm{font-family:"Fraunces";font-weight:600;font-size:16.5px;line-height:1.2}
  .ccard .meta{color:var(--muted);font-size:12.5px;margin-top:3px}
  .ccard .row2{display:flex;align-items:center;justify-content:space-between;margin-top:11px}
  .pills{display:flex;gap:5px;flex-wrap:wrap}
  .pill{font-size:10.5px;font-weight:700;letter-spacing:.02em;padding:3px 8px;border-radius:20px}
  .p-fin{background:var(--green-soft);color:#1d5734}
  .p-pr{background:var(--blue-soft);color:#214b6e}
  .p-stx{background:var(--amber-soft);color:#8a560f}
  .p-tax{background:#ece7f3;color:#5a4a80}
  .p-9{background:#f0e8e2;color:#7a5436}
  .p-rn{background:#e7eee8;color:#3a5a44}
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
  .b-biz{background:var(--ink);color:#fff}
  .b-per{background:#dfe7e6;color:var(--teal-ink)}
  .assignee{font-size:12px;color:var(--muted)}
  .assignee b{color:var(--ink);font-weight:600}
  /* worklist tables */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:6px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-weight:600;color:var(--muted);font-size:11.5px;letter-spacing:.04em;
    text-transform:uppercase;padding:13px 14px;background:#faf7f0;border-bottom:1px solid var(--line)}
  td{padding:12px 14px;border-bottom:1px solid #efeade;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fcfaf4}
  .lname{font-weight:600;cursor:pointer}
  .lname:hover{color:var(--teal);text-decoration:underline}
  .mono{font-variant-numeric:tabular-nums}
  /* month grid */
  .mcell{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;
    cursor:pointer;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;
    margin:0 auto;transition:.1s;user-select:none}
  .mcell.done{background:var(--green-soft);border-color:#bcdcc6;color:var(--green)}
  .mcell.bill{background:var(--amber-soft);border-color:#e8d3a6;color:var(--amber)}
  .mcell.paid{background:var(--paid);border-color:var(--paid);color:#fff}
  .mcell.na{background:var(--red-soft);border-color:#e8c4bf;color:var(--red)}
  .mcell.lock{background:transparent;border-color:transparent;color:#c2c8d4;cursor:default}
  .mcell.lock-hist{cursor:default}
  .mcell.lock:hover{border-color:transparent}
  .mh-now{color:var(--teal)!important;position:relative}
  .mh-now::after{content:"";position:absolute;left:6px;right:6px;bottom:4px;height:2px;background:var(--teal);border-radius:2px}
  .mtd-now{background:#f3f6fc}
  .lgd i.lg-done{background:var(--green)}.lgd i.lg-bill{background:var(--amber)}
  .lgd i.lg-paid{background:var(--paid)}.lgd i.lg-na{background:var(--red)}
  .lgd i.lg-lock{background:#c2c8d4}
  .mcell:hover{border-color:var(--teal)}
  .mcell.prog{background:var(--blue-soft);border-color:#bcd0e2;color:var(--blue)}
  .mcell.wait{background:var(--amber-soft);border-color:#e8d3a6;color:var(--amber)}
  .mcell.prep{background:var(--teal-soft);border-color:#c5d0ec;color:var(--teal-ink)}
  .mcell.delayed{box-shadow:0 0 0 2px var(--red);border-color:var(--red)!important}
  .lgd i.lg-prog{background:var(--blue)}.lgd i.lg-wait{background:var(--amber)}
  .lgd i.lg-prep{background:var(--teal)}.lgd i.lg-delayed{background:var(--red)}
  .rolepick{display:flex;align-items:center;gap:8px}
  .rolepick select{appearance:none;border:1px solid var(--line);border-radius:10px;padding:9px 30px 9px 12px;
    background:#fff;font:inherit;font-size:13px;color:var(--ink);cursor:pointer}
  .doorbar{display:flex;align-items:center;gap:11px;background:var(--amber-soft);border:1px solid #e8d3a6;
    color:#6b4a12;border-radius:13px;padding:11px 15px;margin-bottom:16px;font-size:13px;line-height:1.45}
  .doorbar b{color:#5a3d0e}.doorbar .lk{font-size:18px}
  .tw-timer{display:flex;flex-wrap:wrap;align-items:flex-end;gap:16px;background:var(--card);
    border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:18px}
  .tw-timer .fld{display:flex;flex-direction:column;gap:6px}
  .tw-timer label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .tw-timer select{padding:9px 11px;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:14px;background:#fff;min-width:150px}
  .tw-clock{font-variant-numeric:tabular-nums;font-size:40px;font-weight:800;color:var(--muted);letter-spacing:1px;min-width:182px;line-height:1}
  .tw-clock.run{color:var(--green)}
  .tw-go{all:unset;cursor:pointer;background:var(--green);color:#fff;padding:13px 24px;border-radius:12px;font-weight:700;font-size:15px}
  .tw-go.stop{background:var(--red)}
  .tw-live{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--green)}
  .tw-live i{width:9px;height:9px;border-radius:50%;background:var(--green);animation:twpulse 1.1s infinite}
  @keyframes twpulse{0%,100%{opacity:1}50%{opacity:.25}}
  /* vault groups */
  .vgroup{background:var(--card);border:1px solid var(--line);border-radius:13px;margin-bottom:10px;overflow:hidden}
  .vgroup summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:14px}
  .vgroup summary::-webkit-details-marker{display:none}
  .vgroup summary::before{content:"▸";color:var(--muted);transition:.15s}
  .vgroup[open] summary::before{transform:rotate(90deg)}
  .vgroup .vcount{margin-left:auto;background:var(--teal-soft);color:var(--teal-ink);font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px}
  .vgroup table{margin:0 6px 8px}
  /* 1099 count grid */
  .t9cell{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
  .t9cell.has{background:var(--green-soft);border-color:#bcdcc6;color:var(--green)}
  .t9cell.part{background:var(--blue-soft);border-color:#bcd0e2;color:var(--blue)}
  .t9cell:hover{border-color:var(--teal)}
  .t9rem{font-weight:700}.t9rem.open{color:var(--red)}.t9rem.done{color:var(--green)}
  /* user chips */
  .uchip{display:inline-block;background:var(--teal-soft);color:var(--teal-ink);font-size:11px;font-weight:600;
    padding:2px 8px;border-radius:999px;margin:2px 3px 0 0}
  .ustat{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .ustat.act{background:var(--green-soft);color:var(--green)}
  .ustat.inv{background:var(--amber-soft);color:var(--amber)}
  .urole{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--blue-soft);color:var(--blue)}
  .modgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:6px}
  .modgrid label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink)}
  /* team rollup */
  .team{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:10px}
  .team .th{display:flex;align-items:center;gap:10px;font-weight:700}
  .team .tt{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600}
  .team .tm{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-top:1px solid var(--line);margin-top:8px}
  .edited{font-size:10px;color:var(--muted);font-style:italic;margin-left:6px}
  th.mh{text-align:center;padding:11px 4px}
  td.mtd{text-align:center;padding:7px 3px}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  /* slide-over */
  .scrim{position:fixed;inset:0;background:rgba(33,31,26,.34);opacity:0;pointer-events:none;
    transition:.2s;z-index:40}
  .scrim.show{opacity:1;pointer-events:auto}
  .over{position:fixed;top:0;right:0;height:100vh;width:460px;max-width:92vw;background:var(--paper);
    box-shadow:-12px 0 40px rgba(33,31,26,.18);transform:translateX(102%);transition:.24s cubic-bezier(.4,0,.2,1);
    z-index:50;display:flex;flex-direction:column}
  .over.show{transform:translateX(0)}
  .ohead{padding:22px 24px 16px;border-bottom:1px solid var(--line);background:var(--card)}
  .ohead .nm{font-family:"Fraunces";font-weight:600;font-size:23px;line-height:1.12}
  .ohead .sub{color:var(--muted);font-size:13px;margin-top:5px}
  .obody{overflow-y:auto;padding:20px 24px 30px;flex:1}
  .sect{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    margin:22px 0 10px}
  .sect:first-child{margin-top:0}
  .field{display:flex;justify-content:space-between;gap:14px;padding:7px 0;font-size:13.5px;border-bottom:1px dashed #e7e1d3}
  .field .k{color:var(--muted)}
  .field .v{text-align:right;font-weight:500}
  /* service toggle rows */
  .svc{display:flex;align-items:center;gap:12px;padding:12px 13px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
  .svc .si{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
  .svc .st{flex:1}
  .svc .st .t{font-weight:600;font-size:14px}

function fridaysInMonth(year,monthIdx){
  let n=0; const d=new Date(year,monthIdx,1);
  while(d.getMonth()===monthIdx){ if(d.getDay()===5)n++; d.setDate(d.getDate()+1); }

function viewWork(kind){
 let list=clients.filter(c=>c[kind]).sort((a,b)=>a.name.localeCompare(b.name));
 if(!list.length)return `<div class="panel"><div class="empty">
   No clients here yet.<br><br>Open a client and switch <b>${labelOf(kind)}</b> on — they’ll appear here instantly.</div></div>`;
 const cur=isCurYear();
 const m=cur?new Date().getMonth():-1;            // no "current month" on a historical year
 const stages=STAGE_SETS[kind];
 let dueCount=0,notStarted=0; const sc={}; stages.forEach(s=>sc[s.k]=0);
 let yDue=0,yDone=0;
 list.forEach(c=>{
   for(let i=0;i<12;i++){ if(!isDue(c,kind,i))continue; yDue++; if((track(c,kind)[i]||"")==="dn")yDone++; }
   if(cur&&isDue(c,kind,m)){ dueCount++; const s=track(c,kind)[m]||""; if(!s)notStarted++; else if(sc[s]!=null)sc[s]++; }
 });
 const head=`<th>Client</th><th>Assigned</th><th>Cadence</th>`
   +MONTHS.map((mo,idx)=>`<th class="mh ${idx===m?'mh-now':''}">${mo}</th>`).join("");
 const rows=list.map(c=>{
   const cells=MONTHS.map((mo,i)=>`<td class="mtd ${i===m?'mtd-now':''}">${mCellHTML(c,kind,i)}</td>`).join("");
   return `<tr><td class="lname" onclick="openClient(${c.id})">${esc(c.name)}</td>
     <td>${esc(assigneeFor(c,kind))}</td><td class="mono">${svcFreq(c,kind)}</td>${cells}</tr>`;}).join("");
 let cards;
 if(cur){
   cards=stat(dueCount,"Due in "+MONTHS[m],"var(--ink)");
   stages.forEach(s=>{const col=s.cls==="prog"?"var(--blue)":s.cls==="wait"?"var(--amber)":s.cls==="prep"?"var(--teal)":"var(--green)";
     cards+=stat(sc[s.k]||0,s.l,col);});
   cards+=stat(notStarted,"Not started","var(--red)");
 }else{
   cards=stat(yDue,"Periods "+viewYear,"var(--ink)")
        +stat(yDone,"Completed","var(--green)")
        +stat(Math.max(0,yDue-yDone),"Not completed","var(--amber)");
 }
 const legend=`<div class="legend" style="margin:14px 0 2px">`
   +stages.map(s=>`<span class="lgd"><i class="lg-${s.cls}"></i>${s.l}</span>`).join("")
   +(cur?`<span class="lgd"><i class="lg-delayed"></i>Delayed (auto)</span>`:"")
   +`<span class="lgd"><i class="lg-na"></i>N/A</span><span class="lgd"><i class="lg-lock"></i>Not due</span>`
   +`<span class="lgd-note">${cur?'click a cell to advance · red ring = past due, flagged automatically':viewYear+' — read-only history'}</span></div>`;
 const note = !cur
   ? `Read-only history for ${viewYear}. Switch the Year selector back to ${CURRENT_YEAR} to make changes.`
   : kind==="fin"
   ? `Every service uses one workflow: In progress → Waiting on client → Prepared → Done. Anything past due flags red on its own. Fees and billing are owner-only and stay out of the team’s view.`
   : `Every service uses one workflow: In progress → Waiting on client → Prepared → Done. “Waiting on client” signals you’re blocked; anything past due flags red automatically.`;
 const countLine = cur
   ? `${list.length} ${labelOf(kind).toLowerCase()} client${list.length!==1?"s":""} · highlighted column = this month (${MONTHS[m]})`
   : `${list.length} ${labelOf(kind).toLowerCase()} client${list.length!==1?"s":""} · ${viewYear} history`;
 return `<div class="stats">${cards}</div>`+legend+
   `<div class="count">${countLine}</div>
   <div class="panel" style="overflow-x:auto"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
   <p class="fineprint">${note}</p>`;
}

/* ---------- workload analytics ---------- */
const SVCMETA={
  fin:{l:"Financials",ic:"📊",col:"#2f7d4f"}, pr:{l:"Payroll",ic:"💵",col:"#2c5d86"},
  stx:{l:"Sales Tax",ic:"🧾",col:"#b9791f"}, tax:{l:"Tax Return",ic:"📋",col:"#5a4a80"},
  t9:{l:"1099s",ic:"📄",col:"#7a5436"}, rend:{l:"Renditions",ic:"🏠",col:"#3a5a44"}};
const FREQ_TP={Weekly:52,"Bi-Weekly":26,"Semi-Monthly":24,Monthly:12,Quarterly:4,Yearly:1};
function svcLoad(c){ // estimated annual touchpoints per service
  return {
    fin: c.fin?(FREQ_TP[c.finFreq]||12):0,
    pr:  c.pr?(FREQ_TP[c.prFreq]||26):0,
    stx: c.stx?(FREQ_TP[c.stxFreq]||12):0,
    tax: c.tax?4:0, t9:c.t9?2:0, rend:c.rend?2:0 };
}
function teamStats(){
  const m=new Date().getMonth(); const map={};
  const ensure=who=>{ if(!map[who])map[who]={name:who,clients:0,load:0,rev:0,
      by:{fin:0,pr:0,stx:0,tax:0,t9:0,rend:0},cnt:{fin:0,pr:0,stx:0,tax:0,t9:0,rend:0},behind:0,_cs:new Set()}; return map[who]; };
  clients.forEach(c=>{
    const L=svcLoad(c);
    for(const k in L){
      if(!c[k]||!L[k])continue;
      const who=assigneeFor(c,k)||"Unassigned";
      const s=ensure(who);
      s.by[k]+=L[k]; s.load+=L[k]; s.cnt[k]++; s._cs.add(c.id);
      if(k==="fin"){ if((trackCur(c,'fin')[m]||"")==="")s.behind++; }
    }
  });
  Object.values(map).forEach(s=>{s.clients=s._cs.size; delete s._cs;});
  return Object.values(map).sort((a,b)=>b.load-a.load);
}
function viewWorkload(){
  const stats=teamStats();
  const real=stats.filter(s=>s.name!=="Unassigned"&&s.name!=="Inactive");
  const unassigned=stats.find(s=>s.name==="Unassigned");
  const maxLoad=Math.max(1,...stats.map(s=>s.load));
  const avgClients=real.length?Math.round(clients.filter(c=>c.assigned&&c.assigned!=="Unassigned").length/real.length):0;
  const avgLoad=real.length?Math.round(real.reduce((a,s)=>a+s.load,0)/real.length):0;
  const busiest=real[0], lightest=real[real.length-1];

  const legend=Object.entries(SVCMETA).map(([k,v])=>
    `<span class="lgd"><i style="background:${v.col}"></i>${v.l}</span>`).join("");

  const bars=stats.map(s=>{
    const isU=s.name==="Unassigned";
    const segs=Object.entries(SVCMETA).map(([k,v])=>{
      if(!s.by[k])return"";
      return `<div class="wseg" style="width:${(s.by[k]/maxLoad)*100}%;background:${v.col}"
        title="${v.l}: ${s.cnt[k]} clients · ${s.by[k]} touchpoints/yr"></div>`;}).join("");
    const diff=avgLoad?Math.round((s.load/avgLoad-1)*100):0;
    const diffCls=isU?"":diff>15?"d-hi":diff<-15?"d-lo":"d-mid";
    const diffTxt=isU?"unassigned — needs an owner":(diff>0?`+${diff}% vs avg`:`${diff}% vs avg`);
    return `<div class="wrow ${isU?'wrow-u':''}">
      <div class="wname">${isU?'⚠️ ':''}${esc(s.name)}
        <span class="wsub">${s.clients} client${s.clients!==1?'s':''}${s.behind?` · <b style="color:var(--amber)">${s.behind} behind</b>`:''}</span>
      </div>
      <div class="wtrack">${segs||'<div class="wseg" style="width:2px;background:#ddd"></div>'}</div>
      <div class="wload"><b>${s.load}</b><span class="wdiff ${diffCls}">${diffTxt}</span></div>
    </div>`;}).join("");

  const chipRows=real.map(s=>{
    const chips=Object.entries(SVCMETA).map(([k,v])=>
      s.cnt[k]?`<span class="schip" style="--c:${v.col}">${v.ic} ${v.l} <b>${s.cnt[k]}</b></span>`:"").join("");
    return `<tr><td class="lname2">${esc(s.name)}</td>
      <td class="mono">${s.clients}</td>
      <td class="mono"><b>${s.load}</b></td>
      <td><div class="chips2">${chips||'<span class="schip" style="--c:#aaa">none</span>'}</div></td></tr>`;}).join("");

  let insight="";
  if(busiest&&lightest&&busiest!==lightest&&avgLoad){
    const ratio=(busiest.load/Math.max(1,lightest.load)).toFixed(1);
    insight=`<div class="insight"><span>💡</span><div>
      <b>${esc(busiest.name)}</b> is carrying the heaviest load (~${busiest.load} touchpoints/yr,
      ${Math.round((busiest.load/avgLoad-1)*100)}% above average), while <b>${esc(lightest.name)}</b>
      sits at ~${lightest.load}. Moving a couple of recurring clients from ${esc(busiest.name)} to
      ${esc(lightest.name)} would even the team out${unassigned?`. You also have <b>${unassigned.clients} unassigned client${unassigned.clients!==1?'s':''}</b> with no owner.`:'.'}
    </div></div>`;
  }

  return `<div class="stats">
     ${stat(real.length,"Team members","var(--ink)")}
     ${stat(clients.length,"Clients","var(--green)")}
     ${stat(busiest?busiest.name:"—","Busiest","var(--amber)")}
     ${stat(unassigned?unassigned.clients:0,"Unassigned","var(--red)")}
    </div>
    ${insight}
    <div class="sect2">By team (reporting manager)</div>
    <div class="count" style="margin-top:0">Each service is attributed to whoever does it — so a manager’s tile rolls up their whole team’s work, including offshore.</div>
    ${teamRollup()}
    <div class="sect2">Workload by estimated effort</div>
    <div class="legend">${legend}<span class="lgd-note">bar length = est. annual touchpoints (recurring filings + jobs)</span></div>
    <div class="panel" style="padding:14px 18px">${bars}</div>
    <div class="sect2">Service mix by person</div>
    <div class="panel"><table><thead><tr>
      <th>Team member</th><th>Clients</th><th>Load / yr</th><th>Services handled</th></tr></thead>
      <tbody>${chipRows}</tbody></table></div>
    <p class="fineprint">“Load” is an estimate of yearly touchpoints: monthly financials = 12, weekly payroll = 52,
      bi-weekly = 26, quarterly sales tax = 4, plus a flat weight for tax returns, 1099s and renditions.
      Adjust the weights to match how your firm actually scopes effort.</p>`;
}

}

  const run=timer.running, el=twElapsed(), disabled=run?"disabled":"";
  const byWho={}; tEntries.forEach(e=>byWho[e.who]=(byWho[e.who]||0)+e.secs);
  const total=tEntries.reduce((a,e)=>a+e.secs,0);
  const rows=tEntries.map((e,i)=>{
     if(editEntry===i){
       const cOpts=sorted.map(c=>`<option ${e.client===c.name?"selected":""}>${esc(c.name)}</option>`).join("");
       const wOpts=STAFF.filter(s=>s!=="Unassigned").map(s=>`<option ${e.who===s?"selected":""}>${s}</option>`).join("");
       const tOpts=Object.keys(TASK_LABEL).map(k=>`<option value="${k}" ${e.task===k?"selected":""}>${TASK_LABEL[k]}</option>`).join("");
       const h=Math.floor(e.secs/3600),m=Math.floor(e.secs%3600/60);
       return `<tr><td><select id="edWho${i}">${wOpts}</select></td><td><select id="edClient${i}">${cOpts}</select></td>
         <td><select id="edTask${i}">${tOpts}</select></td>
         <td><input id="edH${i}" type="number" min="0" value="${h}" style="width:42px">h
             <input id="edM${i}" type="number" min="0" max="59" value="${m}" style="width:42px">m</td>
         <td colspan="2"><button class="reveal" onclick="tSaveEdit(${i})">Save</button>
             <button class="reveal" onclick="editEntry=null;render()">Cancel</button></td></tr>`;
     }
     return `<tr><td>${esc(e.who)}</td><td class="lname">${esc(shortName(e.client))}</td>
       <td>${TASK_LABEL[e.task]||e.task}</td><td class="mono">${fmtDur(e.secs)}${e.edited?'<span class="edited">edited</span>':''}</td>
       <td style="color:var(--muted)">${e.when}</td>
       <td style="white-space:nowrap"><button class="reveal" onclick="tEdit(${i})">edit</button>
           <button class="reveal" onclick="tDelete(${i})">delete</button></td></tr>`;}).join("");
  const whoCards=Object.keys(byWho).sort((a,b)=>byWho[b]-byWho[a]).map(w=>stat(fmtDur(byWho[w]),w,"var(--ink)")).join("");
  return `<div class="tw-timer">
     <div class="fld"><label>Who</label><select id="twWho" ${disabled}>${whoOpts}</select></div>
     <div class="fld"><label>Client</label><select id="twClient" ${disabled}>${clientOpts}</select></div>
     <div class="fld"><label>Task</label><select id="twTask" ${disabled}>${taskOpts}</select></div>
     <div class="fld"><label>${run?'<span class="tw-live"><i></i>Recording</span>':'Elapsed'}</label>
        <div id="twClock" class="tw-clock ${run?'run':''}">${fmtClock(el)}</div></div>
     <button class="tw-go ${run?'stop':''}" onclick="twToggle()">${run?'■ Stop &amp; log':'▶ Start'}</button>
   </div>
   <div class="stats">${stat(fmtDur(total),"Logged today","var(--green)")}${whoCards}</div>
   <div class="count">Today’s entries</div>
   <div class="panel" style="overflow-x:auto"><table><thead><tr><th>Who</th><th>Client</th><th>Task</th><th>Time</th><th>When</th><th></th></tr></thead>
     <tbody>${rows||`<tr><td colspan="6" style="color:var(--muted)">No time logged yet — start the timer above.</td></tr>`}</tbody></table></div>
   <p class="fineprint">Lean &amp; live: pick a client, hit Start, the clock runs in real time, Stop logs it — built to replace the separate QuickBooks Time subscription. <b>Entries are editable</b> — anyone can fix their own time (wrong client, fat-fingered minutes, forgot to stop) without asking an admin; corrected rows show an “edited” tag. Profitability (time vs. fee) and baseline standard-times come as the first enhancement.</p>`;
}
setInterval(()=>{ if(!timer.running)return; const el=document.getElementById("twClock"); if(el)el.textContent=fmtClock(twElapsed()); },1000);

/* ---------- employees / user access ---------- */
const MODULES=["Clients","Financials","Payroll","Sales Tax","1099s","Renditions","Timesheet","Vault","Workload","Users & Access"];
let nextEmp=10;
let employees=[
 {id:++nextEmp,name:"Tushar Patil",loc:"Houston, TX",role:"Owner / Admin",mgr:"—",user:"tushar",modules:MODULES.slice(),status:"Active"},
 {id:++nextEmp,name:"Lizette",loc:"Houston, TX",role:"Manager",mgr:"Tushar Patil",user:"lizette",modules:["Clients","Financials","Payroll","Sales Tax","1099s","Renditions","Timesheet","Vault","Workload"],status:"Active"},
 {id:++nextEmp,name:"Janeth",loc:"Houston, TX",role:"Manager",mgr:"Tushar Patil",user:"janeth",modules:["Clients","Financials","Payroll","Sales Tax","1099s","Renditions","Timesheet","Workload"],status:"Active"},
 {id:++nextEmp,name:"Sam",loc:"Houston, TX",role:"Staff",mgr:"Lizette",user:"sam",modules:["Clients","Financials","Sales Tax","1099s","Timesheet"],status:"Active"},
 {id:++nextEmp,name:"Alvarez",loc:"Houston, TX",role:"Staff",mgr:"Lizette",user:"alvarez",modules:["Clients","Financials","Payroll","Timesheet"],status:"Active"},
 {id:++nextEmp,name:"Mike",loc:"College Station, TX",role:"Staff",mgr:"Lizette",user:"mike",modules:["Clients","Financials","Renditions","Timesheet"],status:"Active"},
 {id:++nextEmp,name:"Shelpa",loc:"Houston, TX",role:"Staff",mgr:"Lizette",user:"shelpa",modules:["Clients","Financials","Timesheet"],status:"Active"},
 {id:++nextEmp,name:"Rahul",loc:"Pune, India",role:"Offshore",mgr:"Janeth",user:"rahul",modules:["Clients","Financials","Timesheet"],status:"Invite sent"},
 {id:++nextEmp,name:"Neha",loc:"Pune, India",role:"Offshore",mgr:"Janeth",user:"neha",modules:["Financials","Sales Tax","Timesheet"],status:"Reset required"},
];
function managerOf(name){const e=employees.find(x=>x.name===name||x.name.split(" ")[0]===name);return e?e.mgr:"—";}
function viewUsers(){
  const byRole=r=>employees.filter(e=>e.role===r).length;
  const pending=employees.filter(e=>e.status!=="Active").length;
  const rows=employees.map(e=>{
    const chips=e.modules.length>4?`${e.modules.slice(0,4).map(m=>`<span class="uchip">${m}</span>`).join("")}<span class="uchip">+${e.modules.length-4}</span>`:e.modules.map(m=>`<span class="uchip">${m}</span>`).join("");
    const sc=e.status==="Active"?"act":"inv";
    return `<tr onclick="openUser(${e.id})" style="cursor:pointer">
      <td class="lname">${esc(e.name)}</td><td>${esc(e.loc)}</td>
      <td><span class="urole">${esc(e.role)}</span></td><td>${esc(e.mgr)}</td>
      <td>${chips}</td><td class="mono">${esc(e.user)}</td>
      <td><span class="ustat ${sc}">${esc(e.status)}</span></td></tr>`;}).join("");
  return `<div class="vault-note"><span>🔐</span><div><b>How logins work.</b> You provision the account and choose exactly what each person can open; the system emails a one-time setup link and the user sets their own password on first login. Passwords are stored encrypted — never shown back, even to you — and the India web door also requires a second factor.</div></div>
   <div class="stats">${stat(employees.length,"Users","var(--ink)")}${stat(byRole("Manager"),"Managers","var(--blue)")}${stat(byRole("Offshore"),"Offshore","var(--teal)")}${stat(pending,"Pending invites","var(--amber)")}</div>
   <div class="count">Click a user to edit their access · use ＋ Add user (top-right) to provision a new login</div>
   <div class="panel" style="overflow-x:auto"><table><thead><tr><th>Name</th><th>Location</th><th>Role</th><th>Reports to</th><th>Modules</th><th>Username</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function openUser(id){
  if(role!=="owner")return;
  const e=id?employees.find(x=>x.id===id):null;
  const mgrOpts=["—",...employees.filter(x=>/Manager|Owner/.test(x.role)).map(x=>x.name)].map(n=>`<option ${e&&e.mgr===n?"selected":""}>${esc(n)}</option>`).join("");
  const roleOpts=["Owner / Admin","Manager","Staff","Offshore"].map(r=>`<option ${e&&e.role===r?"selected":""}>${r}</option>`).join("");
  const mods=MODULES.map(m=>`<label><input type="checkbox" class="umod" value="${m}" ${e&&e.modules.includes(m)?"checked":""}>${m}</label>`).join("");
  document.getElementById("modal").innerHTML=`
    <h2>${e?"Edit user":"Add a user"}</h2><div class="msub">Set who they are, what they can open, and who they report to.</div>
    <div class="mform">
      <label class="el">Full name</label><input class="ef" id="u_name" value="${e?esc(e.name):""}">
      <label class="el">Location</label><input class="ef" id="u_loc" value="${e?esc(e.loc):""}" placeholder="e.g. Houston, TX or Pune, India">
      <div class="two-ef"><div><label class="el">Role</label><select class="ef" id="u_role">${roleOpts}</select></div>
        <div><label class="el">Reports to</label><select class="ef" id="u_mgr">${mgrOpts}</select></div></div>
      <label class="el">Username</label><input class="ef" id="u_user" value="${e?esc(e.user):""}" placeholder="auto from first name if blank">
      <label class="el">Modules they can access</label><div class="modgrid">${mods}</div>
      <div class="shot-note" style="margin-top:12px"><span>✉️</span><div>On save, ${e?"changes take effect at their next login":"a one-time setup link is emailed and they set their own password on first login"}. You never see or store their password.</div></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;align-items:center">
      ${e?`<button class="btn alt" style="color:var(--red)" onclick="deleteUser(${e.id})">Remove</button>`:""}
      <div style="flex:1"></div>
      <button class="btn alt" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveUser(${e?e.id:0})">${e?"Save changes":"Create user"}</button>
    </div>`;
  document.getElementById("mscrim").classList.add("show");
}
function saveUser(id){
  const name=sv("u_name").trim(); if(!name){toast("Name is required");return;}
  const mods=[...document.querySelectorAll(".umod:checked")].map(x=>x.value);
  const user=sv("u_user").trim()||name.toLowerCase().split(" ")[0];
  const data={name,loc:sv("u_loc"),role:sv("u_role"),mgr:sv("u_mgr"),user,modules:mods};
  if(id){Object.assign(employees.find(x=>x.id===id),data);toast(`<b>${esc(name)}</b> updated`);}
  else{employees.push(Object.assign({id:++nextEmp,status:"Invite sent"},data));toast(`<b>${esc(name)}</b> created — setup link sent`);}
  closeModal();render();
}
function deleteUser(id){const e=employees.find(x=>x.id===id);employees=employees.filter(x=>x.id!==id);closeModal();toast(`<b>${esc(e?e.name:"User")}</b> removed`);render();}

/* ---------- 1099s by count ---------- */
function t9CountsOf(c){
  if(viewYear===CURRENT_YEAR)return c.t9Counts;
  c.t9CountsHist=c.t9CountsHist||{};
  if(!c.t9CountsHist[viewYear]){const a=blank12().map(()=>0);
    if(c.t9){const exp=c.t9Expected||0;a[0]=Math.ceil(exp/2);a[1]=exp-a[0];} // prior-year 1099s filed Jan/Feb
    c.t9CountsHist[viewYear]=a;}
  return c.t9CountsHist[viewYear];
}
function t9Done(c){return t9CountsOf(c).reduce((a,b)=>a+(+b||0),0);}
function viewT9(){
  const cur=isCurYear();
  const list=clients.filter(c=>c.t9).sort((a,b)=>a.name.localeCompare(b.name));
  if(!list.length)return `<div class="panel"><div class="empty">No 1099 clients yet. Open a client and switch <b>1099 Filing</b> on.</div></div>`;
  const m=cur?new Date().getMonth():-1; let expTot=0,doneTot=0,monthTot=0;
  list.forEach(c=>{const cnt=t9CountsOf(c);expTot+=(c.t9Expected||0);doneTot+=t9Done(c);if(m>=0)monthTot+=(+cnt[m]||0);});
  const head=`<th>Client</th><th>Assigned</th><th class="mh">Expected</th>`+MONTHS.map((mo,i)=>`<th class="mh ${i===m?'mh-now':''}">${mo}</th>`).join("")+`<th class="mh">Done</th><th class="mh">Left</th>`;
  const rows=list.map(c=>{
    const cnt=t9CountsOf(c),done=t9Done(c),exp=c.t9Expected||0,rem=Math.max(0,exp-done);
    const cells=MONTHS.map((mo,i)=>{const n=+cnt[i]||0;
      return `<td class="mtd ${i===m?'mtd-now':''}"><div class="t9cell ${n?'has':''}${cur?'':' lock-hist'}" title="${mo}: ${n} processed${cur?' — click +1, shift-click −1':' ('+viewYear+')'}"${cur?` onclick="t9bump(${c.id},${i},event)"`:''}>${n||'·'}</div></td>`;}).join("");
    return `<tr><td class="lname" onclick="openClient(${c.id})">${esc(c.name)}</td><td>${esc(assigneeFor(c,'t9'))}</td>
      <td class="mtd mono">${exp||'—'}</td>${cells}
      <td class="mtd mono" style="color:var(--green)">${done}</td>
      <td class="mtd mono t9rem ${rem>0?'open':'done'}">${rem}</td></tr>`;}).join("");
  const lastStat=cur?stat(monthTot,"In "+MONTHS[m],"var(--blue)"):stat(viewYear,"Viewing year","var(--blue)");
  return `<div class="stats">${stat(expTot,"Expected (year)","var(--ink)")}${stat(doneTot,"Processed","var(--green)")}${stat(Math.max(0,expTot-doneTot),"Remaining","var(--amber)")}${lastStat}</div>
   <div class="count">${cur?`Counted by month — a client’s 1099s don’t all arrive together.${isOwner()?' Counts feed your per-1099 billing.':''}`:`${viewYear} history — read-only. Switch the Year selector back to ${CURRENT_YEAR} to log counts.`}</div>
   <div class="panel" style="overflow-x:auto"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
   <p class="fineprint">Set each client’s expected total on their card; log how many you process each month here. “Left” stays red until the expected count is cleared. Click a month to add one, shift-click to subtract.</p>`;
}
function t9bump(id,i,ev){if(!isCurYear())return;const c=clients.find(x=>x.id===id);if(!c)return;c.t9Counts[i]=Math.max(0,(+c.t9Counts[i]||0)+((ev&&ev.shiftKey)?-1:1));render();}

/* ---------- Payroll, counted by month (rolls up to a monthly status) ---------- */
function prCountsOf(c){
  if(viewYear===CURRENT_YEAR)return c.prCounts;
  c.prCountsHist=c.prCountsHist||{};
  if(!c.prCountsHist[viewYear]){const a=blank12().map(()=>0);
    if(c.pr)for(let i=0;i<12;i++)a[i]=prExpected(c,i,viewYear); // prior years fully run
    c.prCountsHist[viewYear]=a;}
  return c.prCountsHist[viewYear];
}
function prTotals(c){return prCountsOf(c).reduce((a,b)=>a+(+b||0),0);}
function viewPayroll(){
  const cur=isCurYear();
  const m=cur?new Date().getMonth():-1;
  const list=clients.filter(c=>c.pr).sort((a,b)=>a.name.localeCompare(b.name));
  if(!list.length)return `<div class="panel"><div class="empty">No payroll clients yet. Open a client and switch <b>Payroll</b> on.</div></div>`;
  let expMonth=0,doneMonth=0,clientsDone=0,yExp=0,yDone=0;
  list.forEach(c=>{ const cnt=prCountsOf(c);
    for(let i=0;i<12;i++){const e=prExpected(c,i,viewYear);yExp+=e;yDone+=Math.min(+cnt[i]||0,e);}
    if(m>=0){const e=prExpected(c,m),got=+cnt[m]||0; expMonth+=e; doneMonth+=Math.min(got,e); if(got>=e)clientsDone++;} });
  const head=`<th>Client</th><th>Assigned</th><th>Processor</th><th class="mh">Cadence</th>`
    +MONTHS.map((mo,i)=>`<th class="mh ${i===m?'mh-now':''}">${mo}</th>`).join("")+`<th class="mh">${cur?'This&nbsp;mo.':'Year'}</th>`;
  const rows=list.map(c=>{
    const cnt=prCountsOf(c);
    const cells=MONTHS.map((mo,i)=>{ const exp=prExpected(c,i,viewYear),got=+cnt[i]||0;
      const cls=exp&&got>=exp?'has':got>0?'part':'';
      const lbl=`${mo}: ${got} of ${exp} run${exp!==1?'s':''} processed${cur?' — click +1, shift-click −1':' ('+viewYear+')'}`;
      return `<td class="mtd ${i===m?'mtd-now':''}"><div class="t9cell ${cls}${cur?'':' lock-hist'}" title="${lbl}"${cur?` onclick="prBump(${c.id},${i},event)"`:''}>${got||'·'}</div></td>`;}).join("");
    let endCell;
    if(cur){const exp=prExpected(c,m),got=+cnt[m]||0; endCell=`<td class="mtd mono t9rem ${got>=exp?'done':'open'}">${got}/${exp}</td>`;}
    else{let ye=0,yg=0;for(let i=0;i<12;i++){const e=prExpected(c,i,viewYear);ye+=e;yg+=Math.min(+cnt[i]||0,e);}endCell=`<td class="mtd mono t9rem ${yg>=ye?'done':'open'}">${yg}/${ye}</td>`;}
    return `<tr><td class="lname" onclick="openClient(${c.id})">${esc(c.name)}</td><td>${esc(assigneeFor(c,'pr'))}</td>
      <td>${esc(c.prProc)}</td><td class="mono">${esc(c.prFreq)}</td>${cells}${endCell}</tr>`;}).join("");
  const stats=cur
    ? `${stat(expMonth,"Runs due in "+MONTHS[m],"var(--ink)")}${stat(doneMonth,"Processed in "+MONTHS[m],"var(--green)")}${stat(Math.max(0,expMonth-doneMonth),"Remaining in "+MONTHS[m],"var(--amber)")}${stat(clientsDone+"/"+list.length,"Clients caught up","var(--blue)")}`
    : `${stat(yExp,"Runs "+viewYear,"var(--ink)")}${stat(yDone,"Processed","var(--green)")}${stat(Math.max(0,yExp-yDone),"Not run","var(--amber)")}${stat(viewYear,"Viewing year","var(--blue)")}`;
  return `<div class="stats">${stats}</div>
   <div class="count">${cur?'Counted by month like 1099s — weekly runs 4–5×, bi-weekly/semi-monthly up to 2×, monthly 1×. A month turns green once every run is logged.':viewYear+' history — read-only. Switch the Year selector back to '+CURRENT_YEAR+' to log runs.'}</div>
   <div class="panel" style="overflow-x:auto"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
   <p class="fineprint">Each cell is the number of runs processed that month; the cadence sets how many are expected. “This&nbsp;mo.” rolls the count up into a status. Click a month to log a run, shift-click to subtract.</p>`;
}
function prBump(id,i,ev){if(!isCurYear())return;const c=clients.find(x=>x.id===id);if(!c)return;c.prCounts[i]=Math.max(0,(+c.prCounts[i]||0)+((ev&&ev.shiftKey)?-1:1));render();}

/* ---------- team rollup (by reporting manager) ---------- */
function teamRollup(){
  const stats=teamStats(); const load=n=>{const s=stats.find(x=>x.name===n);return s?s.load:0;};
  const mgrs=[...new Set(employees.map(e=>e.mgr))].filter(m=>m&&m!=="—")
     .sort((a,b)=>a==="Tushar Patil"?-1:b==="Tushar Patil"?1:a.localeCompare(b));
  return mgrs.map(m=>{
    const mgrFirst=m.split(" ")[0];
    const members=[...new Set([mgrFirst,...employees.filter(e=>e.mgr===m).map(r=>r.name)])];
    const total=members.reduce((a,n)=>a+load(n),0);
    const rows=members.map(n=>`<div class="tm"><span>${esc(n)}${n===mgrFirst?' <span style="color:var(--muted)">· manager</span>':''}</span><span class="mono">${load(n)} pts</span></div>`).join("");
    return `<div class="team"><div class="th">👥 ${esc(mgrFirst)}’s team <span class="tt">${members.length} people · ${total} effort pts</span></div>${rows}</div>`;
  }).join("");
}

/* ---------- timesheet entry editing ---------- */
let editEntry=null;
function tEdit(i){editEntry=i;render();}
function tDelete(i){tEntries.splice(i,1);if(editEntry===i)editEntry=null;toast("Entry deleted");render();}
function tSaveEdit(i){const e=tEntries[i];if(!e)return;
  const h=+sv("edH"+i)||0,mn=+sv("edM"+i)||0;
  e.who=sv("edWho"+i)||e.who; e.client=sv("edClient"+i)||e.client; e.task=sv("edTask"+i)||e.task;
  e.secs=h*3600+mn*60; e.edited=true; editEntry=null; toast("Entry updated"); render();}

render();
</script>
